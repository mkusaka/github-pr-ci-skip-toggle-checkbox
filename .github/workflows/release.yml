name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 11.1.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package extension
        run: pnpm package

      - name: Get version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' dist/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Create release package
        run: |
          # Rename the package.zip created by pnpm package
          mv package.zip github-pr-ci-skip-toggle-checkbox-v${{ steps.version.outputs.version }}.zip

          # Create a source code archive
          zip -r github-pr-ci-skip-toggle-checkbox-source-v${{ steps.version.outputs.version }}.zip . \
            -x "*.git*" \
            -x "*node_modules*" \
            -x "*release-package*" \
            -x "*.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            github-pr-ci-skip-toggle-checkbox-v${{ steps.version.outputs.version }}.zip \
            github-pr-ci-skip-toggle-checkbox-source-v${{ steps.version.outputs.version }}.zip

      - name: Upload Release Assets Summary
        run: |
          {
            echo "### 📦 Release Created Successfully!"
            echo ""
            echo "**Version:** v${{ steps.version.outputs.version }}"
            echo "**Tag:** ${{ github.ref_name }}"
            echo ""
            echo "**Assets:**"
            echo "- \`github-pr-ci-skip-toggle-checkbox-v${{ steps.version.outputs.version }}.zip\` - Chrome Extension package"
            echo "- \`github-pr-ci-skip-toggle-checkbox-source-v${{ steps.version.outputs.version }}.zip\` - Source code"
          } >> "$GITHUB_STEP_SUMMARY"
